# Exemple Nginx — vidéo 360° sur gm-drone.fr
# Fichier : /var/www/gm-drone.fr/PercheVR360.mp4

location ~* \.(mp4|webm)$ {
    add_header Access-Control-Allow-Origin "https://w7h647t8mk-crypto.github.io" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;
    add_header Accept-Ranges bytes always;
    add_header Content-Type video/mp4 always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}
